[build]
  # switch to frontend directory, install deps, then build
  # `npm ci` was failing on Netlify; use plain install which is more tolerant
  command = "cd web/frontend && npm install && npm run build"
  publish = "web/frontend/build"

# optionally set environment variables here or in Netlify dashboard
# [context.production.environment]
#   REACT_APP_API_BASE = "https://my-backend.example.com"
